name: Scheduled Grant Scrape
on:
  schedule:
    - cron: '0 2 * * 1,4'    # Runs twice a week (Monday and Thursday) at 2 AM UTC
  workflow_dispatch:         # Manual trigger from GitHub UI

jobs:
  trigger-scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Python Engine Scrape
        run: |
          curl -X POST "${{ secrets.PYTHON_ENGINE_URL }}/scrape/trigger" \
            -H "X-Internal-Key: ${{ secrets.INTERNAL_WEBHOOK_SECRET }}" \
            -H "Content-Type: application/json" \
            --fail \
            --retry 5 \
            --retry-delay 10

